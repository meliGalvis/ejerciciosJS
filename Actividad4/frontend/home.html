<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control Ganadero</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-left">
        <img src="assets/img/logo.png" class="logo-header">
        <h2>Control Ganadero</h2>
    </div>
    <button onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<div class="main-container">


    <!-- CONTENIDO -->
    <main class="content">
        <h1>Inventario Bovino</h1>

        <!-- FORMULARIO -->
        <div class="form-container">
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="number" id="edad" placeholder="Edad">
            <input type="text" id="raza" placeholder="Raza">
            <select id="genero">
                <option value="">Género</option>
                <option value="Macho">Macho</option>
                <option value="Hembra">Hembra</option>
            </select>
            <button onclick="agregarBovino()">Agregar</button>
        </div>

        <!-- TABLA -->
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>Raza</th>
                    <th>Género</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaBovinos">
            </tbody>
        </table>

    </main>

</div>

<script src="home.js"></script>
</body>
</html>

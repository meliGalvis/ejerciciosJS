<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Ganadero - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="assets/img/logo.png" class="logo">
                <h1>Control Ganadero</h1>
                <p>Gestión de Inventario Bovino</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="1234" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Ingresar
                </button>
                <button class="btn-register" onclick="abrirModal()">Registrarse</button>
            </form>

            <div class="login-status" id="loginStatus">
                <!-- Mensajes aparecerán aquí -->
            </div>
        </div>
    </div>

    

    <!-- MODAL -->
    <div id="modalRegistro" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <h2>Crear Usuario</h2>

            <form id="registerForm">
                <input type="text" id="newUser" placeholder="Usuario" required>
                <input type="password" id="newPassword" placeholder="Contraseña" required>

                <button type="submit">Guardar</button>
            </form>

            <div id="registerStatus"></div>
        </div>
    </div>

</body>
    <script src="script.js"></script>
</html>
